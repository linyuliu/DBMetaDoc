name: CI

on:
  push:
    branches:
      - master
      - main
      - 'codex/**'
  pull_request:

jobs:
  build:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dbmetadoc-web/package-lock.json

      - name: Install Kingbase stub driver
        run: mvn -q install:install-file "-Dfile=dbmetadoc-db/lib/kingbase8-8.6.0.jar" -DgroupId=cn.com.kingbase -DartifactId=kingbase8 -Dversion=8.6.1 -Dpackaging=jar

      - name: Install frontend dependencies
        working-directory: dbmetadoc-web
        run: npm ci

      - name: Build frontend
        working-directory: dbmetadoc-web
        run: npm run build

      - name: Run backend tests
        run: mvn -q -pl dbmetadoc-app -am test

      - name: Package application
        run: mvn -q -pl dbmetadoc-app -am clean package -DskipTests

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbmetadoc-app-jar
          path: dbmetadoc-app/target/dbmetadoc-app-*.jar
          if-no-files-found: error

  windows-build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dbmetadoc-web/package-lock.json

      - name: Install Kingbase stub driver
        shell: pwsh
        run: mvn --% -q install:install-file -Dfile=dbmetadoc-db/lib/kingbase8-8.6.0.jar -DgroupId=cn.com.kingbase -DartifactId=kingbase8 -Dversion=8.6.1 -Dpackaging=jar

      - name: Install frontend dependencies
        working-directory: dbmetadoc-web
        shell: pwsh
        run: npm ci

      - name: Build with Windows wrapper
        shell: cmd
        run: build.cmd -SkipTests
