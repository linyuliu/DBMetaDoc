name: CI

on:
  push:
    branches:
      - release
  pull_request:

jobs:
  build:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dbmetadoc-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: dbmetadoc-web
        run: npm ci

      - name: Build frontend
        working-directory: dbmetadoc-web
        run: npm run build

      - name: Run backend tests
        run: mvn -q -pl dbmetadoc-app -am test

      - name: Package application
        run: mvn -q -pl dbmetadoc-app -am clean package -DskipTests
